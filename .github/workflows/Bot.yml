name: Telegram Bot

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'  # يُعيد التشغيل كل 5 ساعات تلقائياً

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 290  # 4 ساعة و50 دقيقة (أقل من 5 ساعات بقليل)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Kill any running bot instances
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🔪 Sending deleteWebhook..."
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/deleteWebhook?drop_pending_updates=false" | python3 -m json.tool || true

          echo "🔪 Kick #1 — getUpdates to terminate old polling..."
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&timeout=0&limit=1" > /dev/null || true
          sleep 3

          echo "🔪 Kick #2 — second getUpdates for safety..."
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&timeout=0&limit=1" > /dev/null || true

          echo "⏳ Waiting 12 seconds for old instances to fully terminate..."
          sleep 12
          echo "✅ Done — starting fresh instance"

      - name: Run Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_PATH: ${{ secrets.FIREBASE_PATH }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python bot.py
