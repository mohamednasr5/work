name: Telegram Bot (Production)

on:
  workflow_dispatch:      # تشغيل يدوي فقط
  push:
    branches: [main]     # أو عند push

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # ⚠️ GitHub Actions ليس مناسباً للبوتات المستمرة
    # استخدم Render.com أو Railway.app بدلاً من ذلك
    # هذا الملف للاختبار فقط
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN:                  ${{ secrets.BOT_TOKEN }}
          FIREBASE_CREDENTIALS_JSON:  ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASE_URL:               ${{ secrets.FIREBASE_URL }}
          BOT_PASSWORD:               ${{ secrets.BOT_PASSWORD }}
          FIREBASE_PATH:              ${{ secrets.FIREBASE_PATH }}   # ← مسار البيانات
          PORT:                       "8080"
        run: python bot.py
