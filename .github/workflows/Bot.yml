name: Run Telegram Bot

on:
  workflow_dispatch:        # تشغيل يدوي
  push:
    branches: [main]        # أو عند رفع كود جديد
  schedule:
    - cron: '0 */5 * * *'  # كل 5 ساعات تلقائياً (قبل انتهاء الـ 350 دقيقة)

concurrency:
  group: telegram-bot       # يمنع تشغيل نسختين معاً
  cancel-in-progress: true  # يلغي الـ run القديم تلقائياً

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Kill old bot connections
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/deleteWebhook?drop_pending_updates=true"
          sleep 3

      - name: Run bot
        env:
          BOT_TOKEN:                 ${{ secrets.BOT_TOKEN }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          FIREBASE_URL:              ${{ secrets.FIREBASE_URL }}
          BOT_PASSWORD:              ${{ secrets.BOT_PASSWORD }}
          FIREBASE_PATH:             ${{ secrets.FIREBASE_PATH }}
          PORT:                      "8080"
        run: python bot.py
