name: Telegram Bot

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '*/50 * * * *'   # يُعيد التشغيل كل 50 دقيقة تلقائياً

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Kill any running bot instances
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          echo "🔪 Sending deleteWebhook..."
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/deleteWebhook?drop_pending_updates=false" | python3 -m json.tool || true

          echo "🔪 Kicking any active getUpdates polling..."
          curl -s "https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&timeout=0&limit=1" > /dev/null || true

          echo "⏳ Waiting 5 seconds for old instances to terminate..."
          sleep 5
          echo "✅ Done — starting fresh instance"

      - name: Run Telegram Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          FIREBASE_PATH: ${{ secrets.FIREBASE_PATH }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python bot.py
